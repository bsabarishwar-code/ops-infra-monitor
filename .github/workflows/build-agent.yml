name: Build Agent EXE

on:
  push:
    branches: [ main ]
    paths:
      - 'agent.py'
      - '.github/workflows/build-agent.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller requests psutil ping3 urllib3

      - name: Inject relay credentials
        shell: pwsh
        run: |
          $src = Get-Content agent.py -Raw -Encoding utf8
          $src = $src -replace 'PLACEHOLDER_RELAY_URL',       '${{ secrets.RELAY_URL }}'
          $src = $src -replace 'PLACEHOLDER_RELAY_SECRET',    '${{ secrets.RELAY_SECRET }}'
          $src = $src -replace 'PLACEHOLDER_DASHBOARD_TOKEN', '${{ secrets.DASHBOARD_TOKEN }}'
          [System.IO.File]::WriteAllText("$PWD\agent_build.py", $src, [System.Text.UTF8Encoding]::new($false))

      - name: Build universal EXE
        run: python -m PyInstaller --onefile --noconsole --name agent agent_build.py

      - name: Publish release (always tag agent-universal)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: agent-universal
          name: "Agent (Universal Build)"
          body: |
            Universal agent EXE — app_id is read from the filename at runtime.

            Download via relay:
            https://<your-relay>.onrender.com/agent/{app_id}/{store_id}
          files: dist/agent.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
